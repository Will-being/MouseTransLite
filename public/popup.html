<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse Tooltip Translator Lite - Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      min-width: 500px;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      color: #1976d2;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    select, input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #1976d2;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-primary {
      background: #1976d2;
      color: white;
    }
    .btn-primary:hover {
      background: #1565c0;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .btn-danger {
      background: #d32f2f;
      color: white;
    }
    .btn-danger:hover {
      background: #c62828;
    }
    .status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mouse Tooltip Translator Lite</h1>

    <div class="form-group">
      <label for="translateSource">Translate From</label>
      <select id="translateSource">
        <option value="auto">Auto Detect</option>
        <option value="en">English</option>
        <option value="zh-CN">Chinese (Simplified)</option>
        <option value="zh-TW">Chinese (Traditional)</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
      </select>
    </div>

    <div class="form-group">
      <label for="translateTarget">Translate Into</label>
      <select id="translateTarget">
        <option value="en">English</option>
        <option value="zh-CN">Chinese (Simplified)</option>
        <option value="zh-TW">Chinese (Traditional)</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
      </select>
    </div>

    <div class="form-group">
      <label for="translatorVendor">Translation Engine</label>
      <select id="translatorVendor">
        <option value="google">Google Translate</option>
        <option value="bing">Bing Translator</option>
      </select>
    </div>

    <div class="form-group" id="bingApiKeyGroup" style="display: none;">
      <label for="bingApiKey">
        Bing API Key (Required for Bing Translator)
        <a href="https://portal.azure.com/#create/Microsoft.CognitiveServicesTextTranslation"
           target="_blank"
           style="font-size: 12px; color: #1976d2;">
          Get Free API Key
        </a>
      </label>
      <input type="password"
             id="bingApiKey"
             placeholder="Enter your Microsoft Translator API key">
      <div style="margin-top: 12px;">
        <label for="bingRegion">Bing Region (optional)</label>
        <input type="text"
               id="bingRegion"
               placeholder="e.g. global, eastus, westeurope">
      </div>
      <small style="color: #666; font-size: 12px; display: block; margin-top: 5px;">
        Free tier: 2 million characters/month.
        <a href="#" id="showApiKeyHelp" style="color: #1976d2;">How to get?</a>
      </small>
    </div>

    <div class="form-group">
      <label for="translateWhen">Translate When</label>
      <select id="translateWhen">
        <option value="mouseover">Mouseover Only</option>
        <option value="select">Select Only</option>
        <option value="mouseoverselect">Both (Recommended)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="mouseoverTextType">Text Detection Type</label>
      <select id="mouseoverTextType">
        <option value="word">Word</option>
        <option value="sentence">Sentence (Recommended)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="tooltipFontSize">Tooltip Font Size</label>
      <select id="tooltipFontSize">
        <option value="14">14px</option>
        <option value="16">16px</option>
        <option value="18">18px (Default)</option>
        <option value="20">20px</option>
        <option value="22">22px</option>
        <option value="24">24px</option>
      </select>
    </div>

    <div class="form-group">
      <label for="mouseoverEventInterval">Show Delay (milliseconds)</label>
      <select id="mouseoverEventInterval">
        <option value="100">100ms (Fast)</option>
        <option value="200">200ms</option>
        <option value="300">300ms (Default)</option>
        <option value="400">400ms</option>
        <option value="500">500ms (Slow)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="websiteExcludeList">Exclude Websites (one per line)</label>
      <textarea id="websiteExcludeList" rows="3" placeholder="*.example.com&#10;github.com" style="resize: vertical; font-family: monospace;"></textarea>
    </div>

    <div class="button-group">
      <button id="saveBtn" class="btn-primary">Save Settings</button>
      <button id="exportBtn" class="btn-secondary">Export</button>
      <button id="resetBtn" class="btn-danger">Reset</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
